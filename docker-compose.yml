version: '3.8'

# ================================================================
# Day 17 - Redis + Spring Boot 통합 실행 환경
#
# [사용법]
#   전체 기동  : docker compose up -d --build
#   상태 확인  : docker compose ps
#   로그 확인  : docker compose logs -f app
#   종료       : docker compose down
#   볼륨까지 삭제: docker compose down -v
#
# [두 가지 실행 패턴]
#   패턴 A - Compose 풀 스택: redis + app 둘 다 Compose로 기동
#   패턴 B - redis만 Compose, app은 IntelliJ에서 직접 실행
#             → SPRING_PROFILES_ACTIVE=local 로 두면 Redis host = localhost
#
# ================================================================

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-ceompose
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: tixy
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spring-net

  # ── Redis 서버 ────────────────────────────────────────────────
  redis:
    image: redis:8-alpine          # 2026년 기준 최신 안정판 (캐시 기능은 버전 무관)
    container_name: redis-compose
    restart: unless-stopped
    ports:
      - "6379:6379"                # 호스트:컨테이너 - IntelliJ에서도 localhost:6379 로 접근 가능
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]   # PONG 이 오면 healthy
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - spring-net

volumes:
  mysql_data:

networks:
  spring-net:
    name: spring-net
    external: true