server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}  # .env 또는 환경변수로 override 가능, 기본값 local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3307/tixy}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-validity-time: 3600000000    # 1000시간 (ms)
  refresh-token-validity-time: 604800000 # 7일 (ms)

management:
  endpoints:
    web:
      exposure:
        include: health, caches