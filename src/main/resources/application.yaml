server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}  # .env 또는 환경변수로 override 가능, 기본값 local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  flyway:
    enabled: true
    baseline-on-migrate: true   # 기존 DB 있을 때 필수
    locations: classpath:db/migration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3307/tixy?rewriteBatchedStatements=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
  sql:
    init:
      mode: always          # 앱 실행할 때마다 schema.sql 실행
      schema-locations: classpath:schema.sql
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 1
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-validity-time: 3600000000    # 1000시간 (ms)
  refresh-token-validity-time: 604800000 # 7일 (ms)

management:
  endpoints:
    web:
      exposure:
        include: health, caches