name: Deploy Tixy

# main 브랜치 push 또는 PR
on:
  push:
    branches: [main, feat/의존성추가]
  workflow_dispatch:

permissions:
  contents: read    # 코드 체크아웃용 (체크아웃 - Repo에 있는 코드를 Runner에 옮김)

concurrency:
  group: tixy-production-deploy
  cancel-in-progress: false

env:
  DEPLOY_HOST: 125.181.213.48
  SERVER_1_PORT: 20021
  SERVER_2_PORT: 20022
  REMOTE_APP_DIR: /opt/tixy
  REMOTE_JAR_PATH: /tmp/tixy.jar
  JAVA_VERSION: 17

  # 권장 방식: GitHub Repository Secrets에 저장
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

jobs:
  build-and-deploy:
    name: Build and rolling deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'corretto'
          cache: gradle

      - name: Chmod gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot jar
        run: ./gradlew clean bootJar -x test

      - name: Prepare jar artifact
        run: |
          set -e

          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*plain.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "JAR file not found"
            exit 1
          fi

          cp "$JAR_FILE" ./tixy.jar

          echo "Prepared artifact:"
          ls -lh ./tixy.jar

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Register SSH hosts
        run: |
          set -e

          mkdir -p ~/.ssh

          ssh-keyscan -p ${{ env.SERVER_1_PORT }} ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -p ${{ env.SERVER_2_PORT }} ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server 1
        run: |
          set -e

          export SSHPASS="${SSH_PASSWORD}"

          echo "Deploying to server 1..."

          sshpass -e scp \
            -P "${SERVER_1_PORT}" \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o PubkeyAuthentication=no \
            ./tixy.jar \
            "${SSH_USER}@${DEPLOY_HOST}:${REMOTE_JAR_PATH}"

          sshpass -e ssh \
            -p "${SERVER_1_PORT}" \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o PubkeyAuthentication=no \
            "${SSH_USER}@${DEPLOY_HOST}" 'bash -s' << 'EOF'
              set -e

              /opt/tixy/scripts/release.sh

              cp /tmp/tixy.jar /opt/tixy/current/tixy.jar
              chmod 755 /opt/tixy/current/tixy.jar

              /opt/tixy/scripts/restart.sh

              for i in {1..30}; do
                if /opt/tixy/scripts/healthcheck.sh; then
                  echo "Server 1 healthcheck success"
                  exit 0
                fi

                echo "Waiting for server 1 healthcheck..."
                sleep 2
              done

              echo "Server 1 healthcheck failed"
              exit 1
          EOF

          unset SSHPASS

      - name: Deploy to server 2
        run: |
          set -e

          export SSHPASS="${SSH_PASSWORD}"

          echo "Deploying to server 2..."

          sshpass -e scp \
            -P "${SERVER_2_PORT}" \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o PubkeyAuthentication=no \
            ./tixy.jar \
            "${SSH_USER}@${DEPLOY_HOST}:${REMOTE_JAR_PATH}"

          sshpass -e ssh \
            -p "${SERVER_2_PORT}" \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o PubkeyAuthentication=no \
            "${SSH_USER}@${DEPLOY_HOST}" 'bash -s' << 'EOF'
              set -e

              /opt/tixy/scripts/release.sh

              cp /tmp/tixy.jar /opt/tixy/current/tixy.jar
              chmod 755 /opt/tixy/current/tixy.jar

              /opt/tixy/scripts/restart.sh

              for i in {1..30}; do
                if /opt/tixy/scripts/healthcheck.sh; then
                  echo "Server 2 healthcheck success"
                  exit 0
                fi

                echo "Waiting for server 2 healthcheck..."
                sleep 2
              done

              echo "Server 2 healthcheck failed"
              exit 1
          EOF

          unset SSHPASS